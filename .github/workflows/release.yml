name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # Windows x64
  build-windows-x64:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'

      - name: Install dependencies
        run: uv sync

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          uv run pyinstaller build/echolure.spec --distpath dist/windows-x64

      - name: Package
        run: |
          cd dist/windows-x64
          7z a -tzip ../../EchoLure-windows-x64.zip EchoLure.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: EchoLure-windows-x64.zip

  # Windows ARM64
  build-windows-arm64:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: 'x64'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'

      - name: Install dependencies
        run: uv sync

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          uv run pyinstaller build/echolure.spec --distpath dist/windows-arm64

      - name: Package
        run: |
          cd dist/windows-arm64
          7z a -tzip ../../EchoLure-windows-arm64.zip EchoLure.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-arm64
          path: EchoLure-windows-arm64.zip

  # macOS ARM64
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'

      - name: Install dependencies
        run: uv sync

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          uv run pyinstaller build/echolure.spec --distpath dist/macos-arm64

      - name: Package
        run: |
          cd dist/macos-arm64
          zip -r ../../EchoLure-macos-arm64.zip EchoLure.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: EchoLure-macos-arm64.zip

  # Linux x64
  build-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Install dependencies
        run: uv sync

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          uv run pyinstaller build/echolure.spec --distpath dist/linux-x64

      - name: Package
        run: |
          cd dist/linux-x64
          zip -r ../../EchoLure-linux-x64.zip EchoLure

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: EchoLure-linux-x64.zip

  # Linux ARM64
  build-linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev

      - name: Install dependencies
        run: uv sync

      - name: Install PyInstaller
        run: uv pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          uv run pyinstaller build/echolure.spec --distpath dist/linux-arm64

      - name: Package
        run: |
          cd dist/linux-arm64
          zip -r ../../EchoLure-linux-arm64.zip EchoLure

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: EchoLure-linux-arm64.zip

  # 创建 Release
  create-release:
    needs: [build-windows-x64, build-windows-arm64, build-macos-arm64, build-linux-x64, build-linux-arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-x64/EchoLure-windows-x64.zip
            artifacts/windows-arm64/EchoLure-windows-arm64.zip
            artifacts/macos-arm64/EchoLure-macos-arm64.zip
            artifacts/linux-x64/EchoLure-linux-x64.zip
            artifacts/linux-arm64/EchoLure-linux-arm64.zip
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
